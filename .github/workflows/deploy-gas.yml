name: Deploy GAS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリ取得
        uses: actions/checkout@v4
      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: 依存関係をインストール
        run: npm ci
      - name: 認証ファイルを復元
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
          CLASP_JSON: ${{ secrets.CLASP_JSON }}
        run: |
          test -n "$CLASPRC_JSON" || { echo "CLASPRC_JSON secret is not configured."; exit 1; }
          test -n "$CLASP_JSON" || { echo "CLASP_JSON secret is not configured."; exit 1; }
          printf '%s' "$CLASPRC_JSON" > ~/.clasprc.json
          printf '%s' "$CLASP_JSON" > .clasp.json
          chmod 600 ~/.clasprc.json .clasp.json
          jq -e . ~/.clasprc.json >/dev/null
          jq -e '.scriptId and .rootDir' .clasp.json >/dev/null
      - name: GAS に反映
        run: npm run push:force

      - name: ウェブアプリをデプロイ
        env:
          GAS_DEPLOYMENT_ID: ${{ secrets.GAS_DEPLOYMENT_ID }}
        run: |
          test -n "$GAS_DEPLOYMENT_ID" || { echo "GAS_DEPLOYMENT_ID secret is not configured."; exit 1; }
          npx clasp deploy \
            --deploymentId "$GAS_DEPLOYMENT_ID" \
            --description "GitHub Actions ${GITHUB_SHA::7}"

      - name: 匿名アクセスを確認
        env:
          GAS_DEPLOYMENT_ID: ${{ secrets.GAS_DEPLOYMENT_ID }}
        run: |
          public_url="https://script.google.com/macros/s/${GAS_DEPLOYMENT_ID}/exec"
          for attempt in {1..12}; do
            if curl --fail --location --silent --show-error "$public_url" --output deployed.html \
              && grep -q '腸内環境ヘルスチェック' deployed.html; then
              echo "Public access verified: $public_url"
              exit 0
            fi
            echo "Waiting for public deployment... ($attempt/12)"
            sleep 5
          done
          echo "The web app is not publicly accessible."
          exit 1
