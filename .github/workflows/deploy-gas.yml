name: Deploy GAS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリ取得
        uses: actions/checkout@v4
      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: 依存関係をインストール
        run: npm ci
      - name: 認証ファイルを復元
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
          CLASP_JSON: ${{ secrets.CLASP_JSON }}
        run: |
          test -n "$CLASPRC_JSON" || { echo "CLASPRC_JSON secret is not configured."; exit 1; }
          test -n "$CLASP_JSON" || { echo "CLASP_JSON secret is not configured."; exit 1; }
          printf '%s' "$CLASPRC_JSON" > ~/.clasprc.json
          printf '%s' "$CLASP_JSON" > .clasp.json
          chmod 600 ~/.clasprc.json .clasp.json
          jq -e . ~/.clasprc.json >/dev/null
          jq -e '.scriptId and .rootDir' .clasp.json >/dev/null
      - name: GAS に反映
        run: npm run push:force
